<style>
:root{--bg:#0d1117;--fg:#c9d1d9;--card:#161b22;--line:#21262d;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d2993a;--dim:#8b949e;--panel:#1c2128--bg-deep:#0a0f16;--bg-hover:#1f2730;--bg-inset:#0a0e13;--bg-elevated:#21262d;--bg-panel:#1c2128;--bright:#ffffff;}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--line:#d0d7de;--fg:#1f2328;--dim:#636e7b;--bg-deep:#f0f2f4;--bg-hover:#dde1e6;--bg-inset:#eaeef2;--bg-elevated:#eaeef2;--bg-panel:#f0f2f4;--bright:var(--fg);}
html[data-theme="light"] #sidebar{background:#f0f2f4}
html[data-theme="light"] #topbar{background:#f0f2f4}
html[data-theme="light"] table th{background:#eaeef2;color:var(--dim)}
html[data-theme="light"] #sidebar-nav a:hover,html[data-theme="light"] #sidebar-nav a.active,html[data-theme="light"] #sidebar-footer a:hover,html[data-theme="light"] #sidebar-footer button.signout:hover{background:#dde1e6;color:var(--fg)}
html[data-theme="light"] #mob-menu,html[data-theme="light"] #sidebar-reopen{background:#f0f2f4!important;color:var(--fg)!important;border-color:var(--line)!important}
html[data-theme="light"] .card{border-color:var(--line)}
html[data-theme="light"] input:not([type=range]),html[data-theme="light"] select,html[data-theme="light"] textarea{background:var(--card)!important;color:var(--fg)!important;border-color:var(--line)!important}
html[data-theme="light"] tr:nth-child(even){background:rgba(0,0,0,.025)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,'SF Pro',ui-sans-serif,sans-serif;font-size:13px;min-height:100vh}

/* Top action bar */
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:14px;font-weight:600;margin-right:auto}
.hint-label{font-size:11px;color:var(--dim);background:var(--panel);border:1px solid var(--line);padding:2px 8px;border-radius:4px}
.btn{background:var(--panel);border:1px solid var(--line);color:var(--fg);padding:5px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn.primary{background:var(--blue);color:#000;border-color:var(--blue)}
.btn.primary:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}

main{max-width:900px;margin:0 auto;padding:20px}

/* Modified card — floats to top, accent border */
.modified-card{background:var(--card);border:1px solid rgba(210,153,34,.5);border-radius:8px;margin-bottom:16px;overflow:hidden;display:none}
.modified-card.visible{display:block}
.modified-card .card-hdr{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(210,153,34,.07);border-bottom:1px solid rgba(210,153,34,.3)}
.modified-card .card-hdr h2{font-size:13px;font-weight:700;color:var(--yellow)}
.modified-card .card-hdr .badge{background:var(--yellow);color:#000;font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px}
.modified-card .card-hdr .card-hint{font-size:11px;color:rgba(210,153,34,.7);margin-left:auto}
.modified-body{padding:8px 4px}

/* Section cards */
.sec-card{background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none;transition:background .12s}
.sec-hdr:hover{background:rgba(255,255,255,.03)}
.sec-hdr .sec-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.sec-hdr h2{font-size:13px;font-weight:600;flex:1}
.sec-hdr .total-badge{font-size:10.5px;color:var(--dim);background:var(--panel);border:1px solid var(--line);padding:1px 8px;border-radius:10px}
.sec-hdr .dirty-badge{background:var(--yellow);color:#000;font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px;display:none}
.sec-hdr .dirty-badge.visible{display:inline-block}
.sec-hdr .chevron{color:var(--dim);font-size:11px;transition:transform .18s;margin-left:4px;flex-shrink:0}
.sec-card.open .chevron{transform:rotate(90deg)}
.sec-body{display:none;padding:8px 4px;border-top:1px solid var(--line)}
.sec-card.open .sec-body{display:block}

/* Knob rows */
.ctrl{display:flex;align-items:flex-start;padding:8px 12px;gap:14px;border-radius:6px;transition:background .1s}
.ctrl:hover{background:rgba(255,255,255,.03)}
.ctrl.dirty{background:rgba(210,153,34,.06);outline:1px solid rgba(210,153,34,.25)}
.ctrl .label{flex:1;min-width:0}
.ctrl .name{font-size:12px;font-weight:600;font-family:ui-monospace,Menlo,monospace;color:var(--fg)}
.ctrl .desc{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.5}
.ctrl .input{display:flex;align-items:center;flex-shrink:0;padding-top:2px}
.switch{width:36px;height:20px;border-radius:10px;background:var(--line);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.switch.on{background:var(--green)}
.switch.on::after{transform:translateX(16px)}
.num{background:var(--bg);border:1px solid var(--line);color:var(--fg);border-radius:4px;padding:4px 7px;font-size:12px;width:90px;text-align:right;outline:none}
.num:focus{border-color:var(--blue)}
.text{background:var(--bg);border:1px solid var(--line);color:var(--fg);border-radius:4px;padding:4px 7px;font-size:12px;width:300px;resize:vertical;min-height:28px;outline:none}
.text:focus{border-color:var(--blue)}
.restart-badge{font-size:9.5px;color:var(--yellow);background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);padding:1px 6px;border-radius:3px;vertical-align:middle;white-space:nowrap}
.complex-placeholder{background:var(--panel);border:1px dashed var(--line);border-radius:6px;padding:10px 14px;color:var(--dim);font-size:11.5px;font-style:italic;margin:4px 12px}

/* In-modified knobs get a subtle "source" tag */
.modified-src-tag{font-size:9px;color:var(--dim);background:var(--panel);border:1px solid var(--line);padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle;font-weight:400;font-family:ui-monospace,Menlo,monospace}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--line);padding:9px 16px;border-radius:6px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9999}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--yellow);color:var(--yellow)}

/* empty section */
.sec-empty{color:var(--dim);font-size:11.5px;padding:14px;text-align:center;font-style:italic}
</style>

// Inject X-CSRF-Token automatically for every state-mutating same-origin request.
(function() {
  const _orig = window.fetch;
  function _agwTok(){return window.__AGW_CSRF__||(document.cookie.match(/agw_csrf=([^;]+)/)||[])[1]||'';}
  window.fetch = function(resource, init) {
    const m = ((init && init.method) || 'GET').toUpperCase();
    if (m === 'GET' || m === 'HEAD') return _orig.call(this, resource, init);
    init = init || {};
    init.headers = Object.assign({}, init.headers, {'X-CSRF-Token': _agwTok()});
    const _self = this;
    return _orig.call(_self, resource, init).then(function(resp){
      if (resp.status !== 403) return resp;
      // Stale CSRF token (session rotated, or CDN HttpOnly'd the cookie) —
      // refresh from the server and retry once so operators never clear cookies.
      return _orig.call(_self, '/antibot-appsec-gateway/secured/csrf', {credentials:'include'})
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(j){
          if (!j || !j.token || j.token === _agwTok()) return resp;
          window.__AGW_CSRF__ = j.token;
          init.headers = Object.assign({}, init.headers, {'X-CSRF-Token': j.token});
          return _orig.call(_self, resource, init);
        }).catch(function(){ return resp; });
    });
  };
}());
const _dp = h => {
  if (typeof DOMPurify === 'undefined') return h;
  if (/^<t[rhd]/i.test((h||'').trimStart())) {
    const s = DOMPurify.sanitize('<table><tbody>'+h+'</tbody></table>');
    const e = document.createElement('div'); e.innerHTML = s;
    return (e.querySelector('tbody')||e).innerHTML;
  }
  return DOMPurify.sanitize(h);
};
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"'`/]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;','/':'&#47;'}[c]))}

function getSection(name, m) {
  if (name.startsWith('DLP_GROUP_') || name === 'DLP_ENABLED' || name === 'DLP_REDACT' || name === 'DLP_MAX_BYTES') return 'dlp';
  if (name === 'DB_BACKEND' || name === 'POSTGRES_DSN') return 'infra';
  if (m.card === 'bypass' || m.card === 'bypass-paths' || m.kind === 'botlist' || m.kind === 'pathlist') return 'bypass';
  if (m.card === 'infrastructure') return 'infra';
  if (m.card === 'ext-misc' || m.card === 'external-log') return 'external';
  if (m.kind === 'num' || m.kind === 'select') return 'thresholds';
  if (m.kind === 'list' || m.kind === 'text') return 'lists';
  return 'detection';
}

let serverState = {};
let dirty = {};
// Track section open/closed (all collapsed by default)
const _openSections = new Set();

// ─── Render knob control ─────────────────────────────────────────────────────
function buildKnob(name, value, extraClass) {
  const m = META[name];
  if (!m) return null;
  const wrap = document.createElement('div');
  wrap.className = 'ctrl' + (extraClass ? ' ' + extraClass : '');
  wrap.dataset.name = name;

  const label = document.createElement('div');
  label.className = 'label';
  const restartBadge = m.restart ? ' <span class="restart-badge">REQUIRES RESTART</span>' : '';
  label.innerHTML = _dp(`<div class="name">${escapeHtml(name)}${restartBadge}</div><div class="desc">${escapeHtml(m.desc||'')}</div>`);

  const input = document.createElement('div');
  input.className = 'input';

  if (m.kind === 'botlist' || m.kind === 'pathlist') {
    wrap.style.display = 'block';
    wrap.appendChild(label);
    const ph = document.createElement('div');
    ph.className = 'complex-placeholder';
    ph.textContent = `${m.kind === 'botlist' ? 'Authorized bot list' : 'Path list'} editor — open main controls.html for full UI`;
    wrap.appendChild(ph);
    return wrap;
  }

  if (m.kind === 'bool') {
    const sw = document.createElement('div');
    sw.className = 'switch' + (value ? ' on' : '');
    sw.onclick = () => { sw.classList.toggle('on'); mark(name, sw.classList.contains('on')); };
    input.appendChild(sw);
  } else if (m.kind === 'num') {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 'num';
    inp.min = m.min; inp.max = m.max; inp.step = m.step; inp.value = value;
    inp.oninput = () => mark(name, m.step % 1 === 0 ? parseInt(inp.value, 10) : parseFloat(inp.value));
    input.appendChild(inp);
  } else if (m.kind === 'select') {
    const sel = document.createElement('select');
    sel.className = 'num';
    (m.options||[]).forEach(o => {
      const opt = document.createElement('option'); opt.value = o; opt.textContent = o;
      if (String(value).toLowerCase() === o) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => mark(name, sel.value);
    input.appendChild(sel);
  } else if (m.kind === 'list') {
    const ta = document.createElement('textarea');
    ta.className = 'text';
    ta.value = Array.isArray(value) ? value.join(', ') : String(value||'');
    ta.oninput = () => mark(name, ta.value);
    input.appendChild(ta);
  } else if (m.kind === 'text') {
    const it = document.createElement('input');
    it.type = 'text'; it.className = 'num'; it.style.width = '280px'; it.style.textAlign = 'left';
    it.value = String(value||''); if (m.ph) it.placeholder = m.ph;
    it.oninput = () => mark(name, it.value);
    input.appendChild(it);
  }

  wrap.appendChild(label);
  wrap.appendChild(input);
  return wrap;
}

// ─── Dirty tracking ─────────────────────────────────────────────────────────
function mark(name, newVal) {
  const same = JSON.stringify(serverState[name]) === JSON.stringify(newVal);
  if (same) delete dirty[name]; else dirty[name] = newVal;
  document.querySelectorAll(`.ctrl[data-name="${name}"]`).forEach(el => el.classList.toggle('dirty', !same));
  updateActionBar();
  refreshModifiedCard();
  refreshDirtyBadges();
}

function clearDirty() {
  dirty = {};
  document.querySelectorAll('.ctrl.dirty').forEach(el => el.classList.remove('dirty'));
  updateActionBar();
  refreshModifiedCard();
  refreshDirtyBadges();
}

function updateActionBar() {
  const n = Object.keys(dirty).length;
  $('apply').disabled = n === 0;
  $('reset').disabled = n === 0;
  $('hint').textContent = n === 0 ? 'No pending changes.' : `${n} pending change${n > 1 ? 's' : ''} — click Apply to push.`;
}

// ─── Modified card ─────────────────────────────────────────────────────────
function refreshModifiedCard() {
  const card = document.getElementById('modified-card');
  if (!card) return;
  const body = card.querySelector('.modified-body');
  const badge = card.querySelector('.badge');
  const dirtyNames = Object.keys(dirty);
  badge.textContent = dirtyNames.length;
  card.classList.toggle('visible', dirtyNames.length > 0);
  body.innerHTML = '';
  dirtyNames.forEach(name => {
    const m = META[name];
    if (!m) return;
    const sec = SECTION_DEFS.find(s => s.id === getSection(name, m));
    const wrap = document.createElement('div');
    wrap.className = 'ctrl dirty';
    wrap.dataset.name = name;
    const label = document.createElement('div');
    label.className = 'label';
    const restartBadge = m.restart ? ' <span class="restart-badge">REQUIRES RESTART</span>' : '';
    const srcTag = sec ? `<span class="modified-src-tag">${sec.label}</span>` : '';
    label.innerHTML = _dp(`<div class="name">${escapeHtml(name)}${restartBadge}${srcTag}</div><div class="desc">${escapeHtml(m.desc||'')}</div>`);

    // Read-only display of dirty value
    const input = document.createElement('div');
    input.className = 'input';
    const val = dirty[name];
    if (m.kind === 'bool') {
      const sw = document.createElement('div');
      sw.className = 'switch' + (val ? ' on' : '');
      sw.title = 'Click in section below to edit';
      sw.style.pointerEvents = 'none'; // read-only in modified card
      input.appendChild(sw);
    } else {
      const v = document.createElement('span');
      v.style.cssText = 'font-size:11.5px;color:var(--yellow);font-family:ui-monospace,Menlo,monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block';
      v.title = String(val);
      v.textContent = Array.isArray(val) ? val.join(', ') : String(val);
      input.appendChild(v);
    }
    wrap.appendChild(label);
    wrap.appendChild(input);
    body.appendChild(wrap);
  });
}

// ─── Per-section dirty badges ─────────────────────────────────────────────
function refreshDirtyBadges() {
  SECTION_DEFS.forEach(sec => {
    const card = document.getElementById('sec-' + sec.id);
    if (!card) return;
    const n = Object.keys(dirty).filter(k => META[k] && getSection(k, META[k]) === sec.id).length;
    const badge = card.querySelector('.dirty-badge');
    badge.textContent = n;
    badge.classList.toggle('visible', n > 0);
  });
}

// ─── Build layout ─────────────────────────────────────────────────────────
function buildLayout() {
  const main = $('main');
  main.innerHTML = '';

  // Modified card
  const mc = document.createElement('div');
  mc.className = 'modified-card';
  mc.id = 'modified-card';
  mc.innerHTML = `
    <div class="card-hdr">
      <h2>Modified</h2>
      <span class="badge">0</span>
      <span class="card-hint">Knobs with pending changes — read-only here, edit in section below</span>
    </div>
    <div class="modified-body"></div>`;
  main.appendChild(mc);

  // Section cards
  SECTION_DEFS.forEach(sec => {
    const knobsInSection = Object.entries(META).filter(([name, m]) => (name in serverState) && getSection(name, m) === sec.id);
    const card = document.createElement('div');
    card.className = 'sec-card';
    card.id = 'sec-' + sec.id;

    const hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.innerHTML = `
      <span class="sec-icon">${sec.icon}</span>
      <h2>${sec.label}</h2>
      <span style="font-size:11px;color:var(--dim);margin-right:auto">${sec.desc}</span>
      <span class="dirty-badge"></span>
      <span class="total-badge">${knobsInSection.length} knobs</span>
      <span class="chevron">▶</span>`;
    hdr.onclick = () => {
      const open = card.classList.toggle('open');
      if (open) _openSections.add(sec.id); else _openSections.delete(sec.id);
    };
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'sec-body';
    if (knobsInSection.length === 0) {
      body.innerHTML = '<div class="sec-empty">No knobs in this section.</div>';
    } else {
      knobsInSection.forEach(([name, m]) => {
        const el = buildKnob(name, serverState[name]);
        if (el) body.appendChild(el);
      });
    }
    card.appendChild(body);

    if (_openSections.has(sec.id)) card.classList.add('open');
    main.appendChild(card);
  });
}

// ─── Config load / apply ────────────────────────────────────────────────────
async function load() {
  const loadMsg = document.createElement('div');
  loadMsg.style.cssText = 'color:var(--dim);font-size:12px;text-align:center;padding:40px 0';
  loadMsg.textContent = 'Loading config…';
  $('main').innerHTML = '';
  $('main').appendChild(loadMsg);

  try {
    const r = await fetch('/antibot-appsec-gateway/secured/config');
    if (!r.ok) { showToast('Failed to load config (' + r.status + ')', 'err'); return; }
    const body = await r.json();
    serverState = body.state || {};
    clearDirty();
    buildLayout();
    refreshDirtyBadges();
    refreshModifiedCard();
  } catch(e) { showToast('Network error: ' + e.message, 'err'); }
}

async function apply() {
  $('apply').disabled = true;
  try {
    const payload = {};
    for (const [k, v] of Object.entries(dirty)) {
      const m = META[k];
      if (m && m.kind === 'list') payload[k] = String(v).split(',').map(s => s.trim()).filter(Boolean);
      else payload[k] = v;
    }
    const r = await fetch('/antibot-appsec-gateway/secured/config',
      {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const body = await r.json();
    const n = body.applied ? Object.keys(body.applied).length : 0;
    const rej = body.rejected ? Object.keys(body.rejected).length : 0;
    if (r.ok && n) {
      showToast(`Applied ${n} change(s)${rej ? ` (${rej} rejected)` : ''}`, 'ok');
      serverState = body.state || serverState;
      clearDirty();
      buildLayout();
    } else {
      const reasons = body.rejected ? Object.entries(body.rejected).map(([k,v]) => `${k}: ${v}`).join('; ') : 'unknown';
      showToast('Rejected — ' + reasons, 'err');
    }
  } catch(e) { showToast('Network error: ' + e.message, 'err'); }
  $('apply').disabled = Object.keys(dirty).length === 0;
}

function showToast(msg, kind) {
  const t = $('toast');
  t.className = 'toast show ' + (kind||'ok');
  t.textContent = msg;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

document.addEventListener('DOMContentLoaded', () => {
  $('apply').onclick = apply;
  $('reset').onclick = () => load();
  load();
});
</script>

var _dp={'#0d1117':'#f6f8fa','#161b22':'#ffffff','#0a0f16':'#f0f2f4','#21262d':'#eaeef2','#1f2730':'#dde1e6','#0a0e13':'#f0f2f4','#0a1628':'#f0f2f4','#0a0e14':'#f0f2f4','#1a2733':'#e8f4fd','#1c2333':'#f0f6ff','#1a2540':'#dbeafe','#241a0a':'#fffbeb','#1f3a4f':'#dbeafe','#1f4830':'#dcfce7','#1a3a4a':'#dbeafe','#3d1a1a':'#fde8e8','#3f1a1a':'#fde8e8','#3d2a1a':'#fef3c7','#0e3320':'#f0fdf4','#1e1e2e':'var(--card)','#1a1a2a':'#f0f0ff','#152015':'#f0fdf4','#251515':'#fef2f2','#0e2c4a':'#dbeafe'};
if(next==='light'){window._tIM=[];document.querySelectorAll('[style]').forEach(function(el){var s=el.getAttribute('style')||'',o=s,m=false;Object.keys(_dp).forEach(function(k){if(s.toLowerCase().indexOf(k)!==-1){s=s.replace(new RegExp(k,'gi'),_dp[k]);m=true;}});if(m){window._tIM.push({el:el,o:o});el.setAttribute('style',s);}});}else{if(window._tIM){window._tIM.forEach(function(i){i.el.setAttribute('style',i.o);});window._tIM=null;}}
if(typeof Chart!=='undefined'&&Chart.instances)Object.values(Chart.instances).forEach(function(c){window._applyChartColorsToInstance(c,next);});
fetch('/antibot-appsec-gateway/secured/ui-theme',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({theme:next})}).catch(function(){});};
(function(){var b=document.getElementById('theme-toggle');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'☀':'🌙';})();
</script>
