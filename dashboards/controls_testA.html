<style>
:root{--bg:#0d1117;--fg:#c9d1d9;--card:#161b22;--line:#21262d;--blue:#79c0ff;--green:#3fb950;--red:#f85149;--yellow:#d2993a;--dim:#8b949e;--panel:#1c2128--bg-deep:#0a0f16;--bg-hover:#1f2730;--bg-inset:#0a0e13;--bg-elevated:#21262d;--bg-panel:#1c2128;--bright:#ffffff;}
html[data-theme="light"]{--bg:#f6f8fa;--card:#ffffff;--line:#d0d7de;--fg:#1f2328;--dim:#636e7b;--bg-deep:#f0f2f4;--bg-hover:#dde1e6;--bg-inset:#eaeef2;--bg-elevated:#eaeef2;--bg-panel:#f0f2f4;--bright:var(--fg);}
html[data-theme="light"] #sidebar{background:#f0f2f4}
html[data-theme="light"] #topbar{background:#f0f2f4}
html[data-theme="light"] table th{background:#eaeef2;color:var(--dim)}
html[data-theme="light"] #sidebar-nav a:hover,html[data-theme="light"] #sidebar-nav a.active,html[data-theme="light"] #sidebar-footer a:hover,html[data-theme="light"] #sidebar-footer button.signout:hover{background:#dde1e6;color:var(--fg)}
html[data-theme="light"] #mob-menu,html[data-theme="light"] #sidebar-reopen{background:#f0f2f4!important;color:var(--fg)!important;border-color:var(--line)!important}
html[data-theme="light"] .card{border-color:var(--line)}
html[data-theme="light"] input:not([type=range]),html[data-theme="light"] select,html[data-theme="light"] textarea{background:var(--card)!important;color:var(--fg)!important;border-color:var(--line)!important}
html[data-theme="light"] tr:nth-child(even){background:rgba(0,0,0,.025)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,'SF Pro',ui-sans-serif,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.topbar h1{font-size:14px;font-weight:600;color:var(--fg);margin-right:auto}
.badge-label{font-size:11px;color:var(--dim);background:var(--panel);border:1px solid var(--line);padding:2px 8px;border-radius:4px}
.btn{background:var(--panel);border:1px solid var(--line);color:var(--fg);padding:5px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn.primary{background:var(--blue);color:#000;border-color:var(--blue)}
.btn.primary:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}
#hint{font-size:11px;color:var(--dim)}

/* Main layout: sidebar + content */
.layout{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-search{padding:10px 12px;border-bottom:1px solid var(--line)}
.sidebar-search input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--fg);border-radius:5px;padding:5px 9px;font-size:12px;outline:none}
.sidebar-search input:focus{border-color:var(--blue)}
.sidebar-search input::placeholder{color:var(--dim)}
nav{padding:6px 0}
.sec-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-radius:0;font-size:12.5px;color:var(--dim);border-left:3px solid transparent;transition:background .12s,color .12s}
.sec-item:hover{background:rgba(121,192,255,.06);color:var(--fg)}
.sec-item.active{background:rgba(121,192,255,.1);color:var(--blue);border-left-color:var(--blue)}
.sec-item .sec-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sec-item .sec-label{flex:1}
.sec-dirty{background:var(--yellow);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;display:none}
.sec-count{color:var(--dim);font-size:10.5px}

/* Content area */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content-header{padding:14px 20px 10px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;flex-shrink:0}
.content-header h2{font-size:14px;font-weight:600}
.content-header .sec-desc{font-size:11px;color:var(--dim)}
.knob-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:1px}

/* Knob rows — same as controls.html */
.ctrl{display:flex;align-items:flex-start;padding:8px 10px;gap:14px;border-radius:6px;transition:background .1s}
.ctrl:hover{background:rgba(255,255,255,.03)}
.ctrl.dirty{background:rgba(210,153,34,.06);outline:1px solid rgba(210,153,34,.25)}
.ctrl .label{flex:1;min-width:0}
.ctrl .name{font-size:12px;font-weight:600;font-family:ui-monospace,Menlo,monospace;color:var(--fg)}
.ctrl .desc{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.5}
.ctrl .input{display:flex;align-items:center;flex-shrink:0;padding-top:2px}
.switch{width:36px;height:20px;border-radius:10px;background:var(--line);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.switch.on{background:var(--green)}
.switch.on::after{transform:translateX(16px)}
.num{background:var(--bg);border:1px solid var(--line);color:var(--fg);border-radius:4px;padding:4px 7px;font-size:12px;width:90px;text-align:right;outline:none}
.num:focus{border-color:var(--blue)}
.text{background:var(--bg);border:1px solid var(--line);color:var(--fg);border-radius:4px;padding:4px 7px;font-size:12px;width:300px;resize:vertical;min-height:28px;outline:none}
.text:focus{border-color:var(--blue)}
.restart-badge{font-size:9.5px;color:var(--yellow);background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);padding:1px 6px;border-radius:3px;vertical-align:middle;white-space:nowrap}

/* Empty state */
.empty{color:var(--dim);font-size:12px;padding:40px 0;text-align:center}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--line);padding:9px 16px;border-radius:6px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9999}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--yellow);color:var(--yellow)}

/* Complex type placeholder */
.complex-placeholder{background:var(--panel);border:1px dashed var(--line);border-radius:6px;padding:10px 14px;color:var(--dim);font-size:11.5px;font-style:italic}

<script>
// Inject X-CSRF-Token automatically for every state-mutating same-origin request.
(function() {
  const _orig = window.fetch;
  function _agwTok(){return window.__AGW_CSRF__||(document.cookie.match(/agw_csrf=([^;]+)/)||[])[1]||'';}
  window.fetch = function(resource, init) {
    const m = ((init && init.method) || 'GET').toUpperCase();
    if (m === 'GET' || m === 'HEAD') return _orig.call(this, resource, init);
    init = init || {};
    init.headers = Object.assign({}, init.headers, {'X-CSRF-Token': _agwTok()});
    const _self = this;
    return _orig.call(_self, resource, init).then(function(resp){
      if (resp.status !== 403) return resp;
      // Stale CSRF token (session rotated, or CDN HttpOnly'd the cookie) —
      // refresh from the server and retry once so operators never clear cookies.
      return _orig.call(_self, '/antibot-appsec-gateway/secured/csrf', {credentials:'include'})
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(j){
          if (!j || !j.token || j.token === _agwTok()) return resp;
          window.__AGW_CSRF__ = j.token;
          init.headers = Object.assign({}, init.headers, {'X-CSRF-Token': j.token});
          return _orig.call(_self, resource, init);
        }).catch(function(){ return resp; });
    });
  };
}());
const _dp = h => {
  if (typeof DOMPurify === 'undefined') return h;
  if (/^<t[rhd]/i.test((h||'').trimStart())) {
    const s = DOMPurify.sanitize('<table><tbody>'+h+'</tbody></table>');
    const e = document.createElement('div'); e.innerHTML = s;
    return (e.querySelector('tbody')||e).innerHTML;
  }
  return DOMPurify.sanitize(h);
};

function getSection(name, m) {
  if (name.startsWith('DLP_GROUP_') || name === 'DLP_ENABLED' || name === 'DLP_REDACT' || name === 'DLP_MAX_BYTES') return 'dlp';
  if (name === 'DB_BACKEND' || name === 'POSTGRES_DSN') return 'infra';
  if (m.card === 'bypass' || m.card === 'bypass-paths' || m.kind === 'botlist' || m.kind === 'pathlist') return 'bypass';
  if (m.card === 'infrastructure') return 'infra';
  if (m.card === 'ext-misc' || m.card === 'external-log') return 'external';
  if (m.kind === 'num' || m.kind === 'select') return 'thresholds';
  if (m.kind === 'list' || m.kind === 'text') return 'lists';
  return 'detection';
}

let serverState = {};
let dirty = {};
let _activeSection = 'detection';

// ─── Render a single knob (simplified — botlist/pathlist show placeholder) ───
function renderControl(name, value) {
  const m = META[name];
  if (!m) return null;
  const wrap = document.createElement('div');
  wrap.className = 'ctrl';
  wrap.dataset.name = name;

  const label = document.createElement('div');
  label.className = 'label';
  const restartBadge = m.restart ? ' <span class="restart-badge">REQUIRES RESTART</span>' : '';
  label.innerHTML = _dp(`<div class="name">${escapeHtml(name)}${restartBadge}</div><div class="desc">${escapeHtml(m.desc||'')}</div>`);

  const input = document.createElement('div');
  input.className = 'input';

  if (m.kind === 'botlist' || m.kind === 'pathlist') {
    wrap.style.display = 'block';
    wrap.appendChild(label);
    const ph = document.createElement('div');
    ph.className = 'complex-placeholder';
    ph.textContent = `${m.kind === 'botlist' ? 'Authorized bot list' : 'Path list'} editor — open main controls.html for the full UI`;
    wrap.appendChild(ph);
    return wrap;
  }

  if (m.kind === 'bool') {
    const sw = document.createElement('div');
    sw.className = 'switch' + (value ? ' on' : '');
    sw.onclick = () => { sw.classList.toggle('on'); mark(name, sw.classList.contains('on')); };
    input.appendChild(sw);
  } else if (m.kind === 'num') {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 'num';
    inp.min = m.min; inp.max = m.max; inp.step = m.step; inp.value = value;
    inp.oninput = () => mark(name, m.step % 1 === 0 ? parseInt(inp.value, 10) : parseFloat(inp.value));
    input.appendChild(inp);
  } else if (m.kind === 'select') {
    const sel = document.createElement('select');
    sel.className = 'num';
    (m.options||[]).forEach(o => {
      const opt = document.createElement('option'); opt.value = o; opt.textContent = o;
      if (String(value).toLowerCase() === o) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => mark(name, sel.value);
    input.appendChild(sel);
  } else if (m.kind === 'list') {
    const ta = document.createElement('textarea');
    ta.className = 'text';
    ta.value = Array.isArray(value) ? value.join(', ') : String(value||'');
    ta.oninput = () => mark(name, ta.value);
    input.appendChild(ta);
  } else if (m.kind === 'text') {
    const it = document.createElement('input');
    it.type = 'text'; it.className = 'num'; it.style.width = '280px'; it.style.textAlign = 'left';
    it.value = String(value||''); if (m.ph) it.placeholder = m.ph;
    it.oninput = () => mark(name, it.value);
    input.appendChild(it);
  }

  wrap.appendChild(label);
  wrap.appendChild(input);
  return wrap;
}

// ─── Dirty tracking ─────────────────────────────────────────────────────────
function mark(name, newVal) {
  const same = JSON.stringify(serverState[name]) === JSON.stringify(newVal);
  if (same) delete dirty[name]; else dirty[name] = newVal;
  document.querySelectorAll(`.ctrl[data-name="${name}"]`).forEach(el => el.classList.toggle('dirty', !same));
  updateActionBar();
  updateSidebar();
}

function clearDirty() {
  dirty = {};
  document.querySelectorAll('.ctrl.dirty').forEach(el => el.classList.remove('dirty'));
  updateActionBar();
  updateSidebar();
}

function updateActionBar() {
  const n = Object.keys(dirty).length;
  $('apply').disabled = n === 0;
  $('reset').disabled = n === 0;
  $('hint').textContent = n === 0 ? 'No pending changes.' : `${n} pending change${n > 1 ? 's' : ''} — click Apply to push.`;
}

// ─── Sidebar rendering ───────────────────────────────────────────────────────
function updateSidebar() {
  SECTION_DEFS.forEach(sec => {
    const el = document.querySelector(`[data-sec="${sec.id}"]`);
    if (!el) return;
    const dirtyCount = Object.keys(dirty).filter(k => META[k] && getSection(k, META[k]) === sec.id).length;
    const total = Object.entries(META).filter(([k, m]) => (k in serverState) && getSection(k, m) === sec.id).length;
    el.querySelector('.sec-dirty').style.display = dirtyCount > 0 ? '' : 'none';
    el.querySelector('.sec-dirty').textContent = dirtyCount;
    el.querySelector('.sec-count').textContent = total;
    el.classList.toggle('active', sec.id === _activeSection);
  });
}

function buildSidebar() {
  const nav = $('sidebar-nav');
  nav.innerHTML = '';
  SECTION_DEFS.forEach(sec => {
    const el = document.createElement('div');
    el.className = 'sec-item' + (sec.id === _activeSection ? ' active' : '');
    el.dataset.sec = sec.id;
    el.innerHTML = `<span class="sec-icon">${sec.icon}</span>
      <span class="sec-label">${sec.label}</span>
      <span class="sec-count">0</span>
      <span class="sec-dirty"></span>`;
    el.onclick = () => { _activeSection = sec.id; renderSection(); updateSidebar(); };
    nav.appendChild(el);
  });
}

// ─── Section rendering ───────────────────────────────────────────────────────
function renderSection() {
  const area = $('knob-area');
  area.innerHTML = '';
  const search = ($('search-inp').value || '').toLowerCase().trim();
  const sec = SECTION_DEFS.find(s => s.id === _activeSection);
  $('section-title').textContent = sec ? `${sec.icon} ${sec.label}` : '';
  $('section-desc').textContent = sec ? sec.desc : '';

  let count = 0;
  for (const [name, m] of Object.entries(META)) {
    if (!(name in serverState)) continue;
    if (getSection(name, m) !== _activeSection) continue;
    if (search && !name.toLowerCase().includes(search) && !(m.desc||'').toLowerCase().includes(search)) continue;
    const el = renderControl(name, serverState[name]);
    if (el) { area.appendChild(el); count++; }
  }
  if (count === 0) {
    area.innerHTML = `<div class="empty">${search ? 'No knobs match "' + escapeHtml(search) + '"' : 'No knobs in this section yet'}</div>`;
  }
}

// ─── Config load / apply ────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch('/antibot-appsec-gateway/secured/config');
    if (!r.ok) { showToast('Failed to load config (' + r.status + ')', 'err'); return; }
    const body = await r.json();
    serverState = body.state || {};
    clearDirty();
    buildSidebar();
    updateSidebar();
    renderSection();
  } catch(e) { showToast('Network error: ' + e.message, 'err'); }
}

async function apply() {
  $('apply').disabled = true;
  try {
    const payload = {};
    for (const [k, v] of Object.entries(dirty)) {
      const m = META[k];
      if (m && m.kind === 'list') payload[k] = String(v).split(',').map(s => s.trim()).filter(Boolean);
      else payload[k] = v;
    }
    const r = await fetch('/antibot-appsec-gateway/secured/config',
      {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const body = await r.json();
    const n = body.applied ? Object.keys(body.applied).length : 0;
    const rej = body.rejected ? Object.keys(body.rejected).length : 0;
    if (r.ok && n) {
      showToast(`Applied ${n} change(s)${rej ? ` (${rej} rejected)` : ''}`, 'ok');
      serverState = body.state || serverState;
      clearDirty();
      renderSection();
    } else {
      const reasons = body.rejected ? Object.entries(body.rejected).map(([k,v]) => `${k}: ${v}`).join('; ') : 'unknown';
      showToast('Rejected — ' + reasons, 'err');
    }
  } catch(e) { showToast('Network error: ' + e.message, 'err'); }
  $('apply').disabled = Object.keys(dirty).length === 0;
}

function showToast(msg, kind) {
  const t = $('toast');
  t.className = 'toast show ' + (kind||'ok');
  t.textContent = msg;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

// ─── Init ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  $('apply').onclick = apply;
  $('reset').onclick = () => load();
  $('search-inp').oninput = () => renderSection();
  load();
});
</script>

var _dp={'#0d1117':'#f6f8fa','#161b22':'#ffffff','#0a0f16':'#f0f2f4','#21262d':'#eaeef2','#1f2730':'#dde1e6','#0a0e13':'#f0f2f4','#0a1628':'#f0f2f4','#0a0e14':'#f0f2f4','#1a2733':'#e8f4fd','#1c2333':'#f0f6ff','#1a2540':'#dbeafe','#241a0a':'#fffbeb','#1f3a4f':'#dbeafe','#1f4830':'#dcfce7','#1a3a4a':'#dbeafe','#3d1a1a':'#fde8e8','#3f1a1a':'#fde8e8','#3d2a1a':'#fef3c7','#0e3320':'#f0fdf4','#1e1e2e':'var(--card)','#1a1a2a':'#f0f0ff','#152015':'#f0fdf4','#251515':'#fef2f2','#0e2c4a':'#dbeafe'};

(function(){var b=document.getElementById('theme-toggle');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'☀':'🌙';})();
</script>
