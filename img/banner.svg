<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">AntiBot/WAF GW</title>
  <desc id="banner-desc">Hardened anti-automation reverse proxy — layered defence against bots, scrapers, headless browsers and AI agents. A block-rate bar chart shows bot requests (red) blocked versus legitimate traffic (green) passed. Control families: TLS/JA4, rate-limit, honeypots, proof-of-work, risk score, GeoIP. Stats shown: 70 controls, 36 weighted signals, 0 HIGH/CRITICAL CVEs, 8.4k tests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#58a6ff"/>
      <stop offset=".5" stop-color="#7ee787"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ff7b72" stop-opacity=".30"/>
      <stop offset="1" stop-color="#ff7b72" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shieldfill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1c2230"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
      .chip{font-size:15px;font-weight:600;fill:#adbac7}
    </style>
  </defs>

  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" rx="3" fill="url(#accent)"/>

  <!-- bottom-strip block-rate motif: tall red bars = bot requests blocked, short green = legit passed -->
  <g opacity=".92">
    <line x1="56" y1="261" x2="544" y2="261" stroke="#30363d" stroke-width="1.5"/>
    <rect x="60"  y="222" width="20" height="38" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="90"  y="216" width="20" height="44" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="120" y="244" width="20" height="16" rx="3" fill="#7ee787" opacity=".9"/>
    <rect x="150" y="216" width="20" height="44" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="180" y="220" width="20" height="40" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="210" y="228" width="20" height="32" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="240" y="246" width="20" height="14" rx="3" fill="#7ee787" opacity=".9"/>
    <rect x="270" y="216" width="20" height="44" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="300" y="222" width="20" height="38" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="330" y="218" width="20" height="42" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="360" y="242" width="20" height="18" rx="3" fill="#7ee787" opacity=".9"/>
    <rect x="390" y="216" width="20" height="44" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="420" y="226" width="20" height="34" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="450" y="218" width="20" height="42" rx="3" fill="#ff7b72" opacity=".82"/>
    <rect x="480" y="245" width="20" height="15" rx="3" fill="#7ee787" opacity=".9"/>
    <rect x="510" y="220" width="20" height="40" rx="3" fill="#ff7b72" opacity=".82"/>
  </g>

  <!-- shield glyph -->
  <g transform="translate(724,150)" opacity=".9">
    <path d="M0 -54 L46 -36 V6 C46 40 26 62 0 74 C-26 62 -46 40 -46 6 V-36 Z"
          fill="url(#shieldfill)" stroke="#30363d" stroke-width="2"/>
    <path d="M-20 2 L-6 18 L22 -18" stroke="#7ee787" stroke-width="6" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- title -->
  <text x="60" y="118" font-size="64" font-weight="800" fill="#e6edf3" letter-spacing="-1">AntiBot/WAF GW</text>
  <text x="63" y="158" font-size="21" font-weight="500" fill="#8b949e">Hardened anti-automation reverse proxy — bots, scrapers &amp; AI agents.</text>

  <!-- control-family chips -->
  <g transform="translate(63,178)">
    <g>
      <rect x="0" y="0" width="104" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#bc8cff"/><text x="34" y="23" class="chip">TLS / JA4</text>
    </g>
    <g transform="translate(116,0)">
      <rect x="0" y="0" width="112" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#f0883e"/><text x="34" y="23" class="chip">Rate-limit</text>
    </g>
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="110" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#7ee787"/><text x="34" y="23" class="chip">Honeypots</text>
    </g>
    <g transform="translate(362,0)">
      <rect x="0" y="0" width="72" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#d29922"/><text x="34" y="23" class="chip">PoW</text>
    </g>
    <g transform="translate(446,0)">
      <rect x="0" y="0" width="116" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#ff7b72"/><text x="34" y="23" class="chip">Risk score</text>
    </g>
    <g transform="translate(574,0)">
      <rect x="0" y="0" width="90" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#58a6ff"/><text x="34" y="23" class="chip">GeoIP</text>
    </g>
  </g>

  <!-- right-side KPI tiles -->
  <g transform="translate(820,70)">
    <g>
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#7ee787">70</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">CONTROLS</text>
    </g>
    <g transform="translate(166,0)">
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#58a6ff">36</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">SIGNALS</text>
    </g>
    <g transform="translate(0,86)">
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#bc8cff">0</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">HIGH CVEs</text>
    </g>
    <g transform="translate(166,86)">
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#d29922">8.4k</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">TESTS</text>
    </g>
  </g>
</svg>
