services:
  appsec-antibot-gw:
    build: .
    image: appsec-antibot-gw:1.4
    container_name: appsec-antibot-gw1.4
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      # UPSTREAM is required; supply via env, e.g.:
      #   UPSTREAM=https://your-frontend.example.com docker compose up -d
      UPSTREAM: ${UPSTREAM:?UPSTREAM env var is required}
      BURST: ${BURST:-5}
      REFILL: ${REFILL:-1.0}
      TRUST_XFF: ${TRUST_XFF:-last}
      ADMIN_KEY: ${ADMIN_KEY:-}
      DEBUG: ${DEBUG:-0}
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    volumes:
      - antibot-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  antibot-data:
