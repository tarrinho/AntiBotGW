# AppSecGW 1.6.5 — turnkey docker-compose deployment with TimescaleDB sidecar.
#
# Quick start:
#   1. cp .env.example .env
#   2. edit .env — at minimum set UPSTREAM, ADMIN_ALLOWED_IPS, TRUSTED_PROXIES,
#      and any external-integration keys you want active.
#   3. docker compose up -d
#
# Architecture:
#   • appsec-antibot-gw (this image)            — the gateway, on port 8443
#   • appsec-timescaledb (TimescaleDB pg16)     — always running standby; the
#       gateway points POSTGRES_DSN at it. Switch DB_BACKEND from sqlite →
#       postgres via the Controls dashboard's pill toggle (RESTART REQUIRED;
#       handled automatically by docker's restart policy).
#
# All integrations auto-enable when their config is present.  MaxMind dbs
# auto-download on first boot when MAXMIND_LICENSE_KEY is set.

services:
  appsec-timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: appsec-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appsec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      POSTGRES_DB:   ${POSTGRES_DB:-appsec}
    volumes:
      - appsec-timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-appsec}",
                                   "-d", "${POSTGRES_DB:-appsec}"]
      interval: 10s
      timeout:  3s
      retries:  10

  appsec-antibot-gw:
    image: appsec-antibot-gw:1.6.7
    container_name: appsec-antibot-gw1.6.7
    restart: unless-stopped
    depends_on:
      appsec-timescaledb:
        condition: service_healthy
    ports:
      - "8443:8443"
    environment:
      # ── Required ──────────────────────────────────────────────────────
      UPSTREAM: ${UPSTREAM:?UPSTREAM env var is required}
      PORT: ${PORT:-8443}
      TLS_ENABLED: ${TLS_ENABLED:-0}

      # ── Admin / hardening ─────────────────────────────────────────────
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-127.0.0.1/32}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1/32}
      TRUST_XFF: ${TRUST_XFF:-last}
      ADMIN_KEY: ${ADMIN_KEY:-}

      # ── Cookie gate ──────────────────────────────────────────────────
      JS_CHALLENGE: ${JS_CHALLENGE:-1}
      JS_CHAL_OPEN_PATHS: ${JS_CHAL_OPEN_PATHS:-/content/,/static/,/assets/,/api/}

      # ── Risk-score thresholds (also tunable live at /__controls) ─────
      SOFT_CHALLENGE_SCORE: ${SOFT_CHALLENGE_SCORE:-4}
      RISK_BAN_THRESHOLD: ${RISK_BAN_THRESHOLD:-50}
      TURNSTILE_RISK_THRESHOLD: ${TURNSTILE_RISK_THRESHOLD:-0}

      # ── External integrations (off-by-default; set keys to enable) ───
      TURNSTILE_SITEKEY: ${TURNSTILE_SITEKEY:-}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-0}
      ABUSEIPDB_KEY: ${ABUSEIPDB_KEY:-}
      CROWDSEC_LAPI_URL: ${CROWDSEC_LAPI_URL:-}
      CROWDSEC_LAPI_KEY: ${CROWDSEC_LAPI_KEY:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      ANUBIS_ENABLED: ${ANUBIS_ENABLED:-0}
      ANUBIS_DIFFICULTY_BOOST: ${ANUBIS_DIFFICULTY_BOOST:-1}
      REDIS_URL: ${REDIS_URL:-}

      # ── Pluggable event store (1.6.4 / 1.6.5) ────────────────────────
      # Default backend is sqlite (zero-deps single-file). Flip to postgres
      # via /__controls — the Timescale sidecar above is always running so
      # the switch is one click + ~2 s container restart, no migration step
      # required (events accumulate fresh in the chosen backend).
      DB_BACKEND: ${DB_BACKEND:-sqlite}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-appsec}:${POSTGRES_PASSWORD}@appsec-timescaledb:5432/${POSTGRES_DB:-appsec}

      # ── Logging ──────────────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8443/antibot-appsec-gateway/live"]
      interval: 10s
      timeout: 2s
      retries: 3

    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777,nosuid,nodev,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    volumes:
      - antibot-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  antibot-data:
  appsec-timescaledb-data:
