name: CodeQL

# Advanced-setup CodeQL (replaces GitHub's *default* setup). OpenSSF Scorecard's
# SAST check greps workflow files for `github/codeql-action/init|analyze`; the
# default setup runs as an internal `dynamic/github-code-scanning/codeql` job
# with NO workflow file, so Scorecard cannot see it. This explicit workflow is
# statically detectable → SAST credit even before any PRs are merged.
#
# PERSONAL (public) mirror only — synced via copy-to-github.sh WORKFLOW_ALLOWLIST.
# CodeQL on a PRIVATE repo needs a GitHub Advanced Security licence, and Scorecard
# only scores the public repo, so this never reaches the corporate mirror.
#
# NOTE: GitHub rejects an advanced-setup workflow while *default* setup is still
# enabled. Disable it first: Settings → Code security → Code scanning →
# CodeQL analysis → ⋯ → Switch to advanced (or Disable), then push this file.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 2'   # weekly — Tuesday 04:27 UTC
  workflow_dispatch:

# Least privilege (Scorecard Token-Permissions): read-only by default; the
# analyze job elevates to exactly what code scanning upload needs.
permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF results to code scanning
      packages: read           # fetch internal CodeQL packs (harmless on public)
      actions: read            # required for private repos; no-op on public
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python]     # single interpreted language — no build step
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          # security-extended = the security-and-quality-adjacent security query
          # pack; broader coverage than the default suite (more Scorecard signal).
          queries: security-extended

      # Python is interpreted — no autobuild / compile step is required.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
