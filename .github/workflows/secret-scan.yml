name: secret-scan

# Gitleaks + TruffleHog on push to main and PRs.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          set +e
          docker run --rm -e NO_COLOR=1 -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --redact \
            --report-format=json --report-path=/repo/gitleaks-report.json --exit-code=1
          code=$?
          set -e
          {
            echo "### Gitleaks"
            if [ "$code" -eq 0 ]; then
              echo "No secrets found."
            else
              echo "$(jq length gitleaks-report.json) secret(s) found:"
              echo ""
              echo "| File | Line | Rule |"
              echo "|------|------|------|"
              jq -r '.[] | "| \(.File) | \(.StartLine) | \(.RuleID) |"' gitleaks-report.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          rm -f gitleaks-report.json
          exit $code

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        run: |
          set +e
          report=$(docker run --rm -v "${{ github.workspace }}:/repo" \
            trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --json --fail 2>/dev/null)
          code=$?
          set -e
          {
            echo "### TruffleHog"
            if [ "$code" -eq 0 ]; then
              echo "No verified secrets found."
            else
              findings=$(echo "$report" | grep '^{')
              echo "$(echo "$findings" | grep -c '^{') verified secret(s) found:"
              echo ""
              echo "| Detector | File | Line |"
              echo "|----------|------|------|"
              echo "$findings" | jq -r '"| \(.DetectorName) | \(.SourceMetadata.Data.Git.file // "-") | \(.SourceMetadata.Data.Git.line // "-") |"'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code
