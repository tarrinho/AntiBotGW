name: secret-scan

# Gitleaks + TruffleHog on push to main and PRs.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          set +e
          out=$(docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --redact --exit-code=1 2>&1)
          code=$?
          set -e
          {
            echo "### Gitleaks"
            if [ "$code" -eq 0 ]; then
              echo "No secrets found."
            else
              echo "Secrets found:"
              echo '```'
              echo "$out"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        run: |
          set +e
          out=$(docker run --rm -v "${{ github.workspace }}:/repo" \
            trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --fail 2>&1)
          code=$?
          set -e
          {
            echo "### TruffleHog"
            if [ "$code" -eq 0 ]; then
              echo "No verified secrets found."
            else
              echo "Verified secrets found:"
              echo '```'
              echo "$out"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code
