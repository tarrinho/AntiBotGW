name: build · test · scan · push

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: appsec-antibot-gw
  HARBOR_HOST: >harbor<
  HARBOR_PROJECT: antibotappsecgw
  HARBOR_IMAGE: antibotappsecgw

permissions:
  contents: read
  packages: write
  security-events: write   # for CodeQL / Trivy SARIF upload

jobs:
  # ─── 1. Run the unit + integration tests ─────────────────────────────────
  test:
    name: pytest (unit · static · control)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          UPSTREAM:           https://example.com   # required by proxy.py at import
          ADMIN_KEY:          TEST-KEY-DO-NOT-USE
          ADMIN_ALLOWED_IPS:  ''
          ALLOWED_HOSTS:      ''
          DEBUG:              '1'
        run: |
          pytest \
            tests/test_critical.py \
            tests/test_pure.py \
            tests/test_async.py \
            tests/test_blockrate_regressions.py \
            tests/test_path_sweep.py \
            tests/test_v142.py \
            tests/test_v173.py \
            tests/test_control_regressions.py \
            -v --tb=short

  # ─── 2. Build the Docker image (multi-arch) ──────────────────────────────
  build:
    name: docker build (linux/amd64,linux/arm64)
    needs: test
    runs-on: ubuntu-latest
    outputs:
      digest:    ${{ steps.build.outputs.digest }}
      version:   ${{ steps.meta.outputs.version }}
      tags:      ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${{ env.HARBOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=latest
            type=sha,format=short

      - name: Login to Harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build (and push when not a PR)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          pull: true
          provenance: true
          sbom: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 3. Trivy scan (filesystem + image) ──────────────────────────────────
  scan:
    name: trivy CVE scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: '1'
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF (filesystem)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${{ env.HARBOR_IMAGE }}@${{ needs.build.outputs.digest }}
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false
          exit-code: '1'
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF (image)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─── 4. Cosign image signing (keyless OIDC) ─────────────────────────────
  sign:
    name: cosign keyless signing
    needs: [build, scan]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ${{ env.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${{ env.HARBOR_IMAGE }}@${{ needs.build.outputs.digest }}

  # ─── 5. Summary comment on PRs ──────────────────────────────────────────
  pr-summary:
    name: PR summary
    needs: [build, scan]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Print build outputs
        run: |
          echo "::notice title=Image digest::${{ needs.build.outputs.digest }}"
          echo "::notice title=Tags::${{ needs.build.outputs.tags }}"
