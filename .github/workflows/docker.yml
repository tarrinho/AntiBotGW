name: build · test · scan · push

# THE single pipeline: tests · build · trivy (fs+image) · secret scan (gitleaks
# + trufflehog) · lint/SAST/deps (ruff/semgrep/mypy/vulture + bandit + pip-audit)
# · sign. One run per push, and a final `badges` job publishes per-control status
# JSONs to an orphan `badges` branch (README reads those via shields endpoint).
# All badges are computed from THIS workflow's own job results — there are no
# sibling workflows to aggregate anymore.

on:
  push:
    branches: [main]
    # Tag trigger deliberately removed — the `release` job at the bottom of
    # this workflow reads GW_VERSION from config.py, and if the derived tag
    # doesn't exist yet, it creates the git tag + GitHub Release from THIS
    # same run. That way one push produces one run, not two.
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: appsec-antibot-gw
  # Harbor destination is configured via repo secrets/vars so the workflow is
  # safe to publish to any mirror (personal or otherwise); when the secrets are
  # absent, every Harbor step short-circuits via the HAS_HARBOR gate and only
  # the ghcr.io push runs. Populate on the corporate mirror:
  #   HARBOR_HOST     — e.g. harbor.example.com
  #   HARBOR_PROJECT  — e.g. myproject
  #   HARBOR_IMAGE    — e.g. myimage
  #   HARBOR_USERNAME / HARBOR_PASSWORD — Harbor robot account credentials
  HARBOR_HOST:    ${{ vars.HARBOR_HOST }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT }}
  HARBOR_IMAGE:   ${{ vars.HARBOR_IMAGE }}
  GHCR_HOST: ghcr.io

# Least privilege (OpenSSF Scorecard Token-Permissions): the default token is
# READ-ONLY for every job. The jobs that need to write — push images, upload
# SARIF, push the badges branch, sign, cut a release — request exactly that scope
# at the JOB level below.
permissions:
  contents: read

jobs:
  # ─── 1. Run the unit + integration tests ─────────────────────────────────
  tests:
    name: pytest (3 layers · 68 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install deps (hash-pinned)
        run: |
          pip install --require-hashes -r requirements.lock

      - name: Run tests
        env:
          UPSTREAM:           https://example.com   # required by proxy.py at import
          ADMIN_KEY:          TEST-KEY-DO-NOT-USE
          ADMIN_ALLOWED_IPS:  ''
          ALLOWED_HOSTS:      ''
          DEBUG:              '1'
        # --cov collects coverage; --cov-fail-under=10 is a floor SET INTENTIONALLY
        # LOW (baseline unknown; ratcheted up release-over-release) so CI doesn't
        # red on introduction. --reruns 1 catches transient flakes (clock-skew /
        # loopback race) without hiding real regressions — a test that fails BOTH
        # times still fails. --reruns-delay 1 gives shared state a moment to settle.
        run: |
          pytest tests/ -v --tb=short \
            --cov=. --cov-report=xml --cov-report=term \
            --cov-config=.coveragerc \
            --cov-fail-under=10 \
            --reruns 1 --reruns-delay 1 \
            --only-rerun 'ConnectionResetError|TimeoutError|BrokenPipeError|assertion.*flaky'

      - name: Upload coverage report
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # ─── 2. Build the Docker image (multi-arch) → Harbor + ghcr.io ───────────
  build-scan:
    name: docker build (linux/amd64,linux/arm64)
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push image to ghcr
      id-token: write   # provenance / SBOM attestations (keyless)
    outputs:
      digest:      ${{ steps.build.outputs.digest }}
      version:     ${{ steps.meta.outputs.version }}
      tags:        ${{ steps.meta.outputs.tags }}
      ghcr_image:  ${{ steps.ghcr.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Lowercase ghcr image path
        id: ghcr
        run: |
          # ghcr requires lowercase — GITHUB_REPOSITORY may contain uppercase
          # letters (e.g. Org-Name/Repo-Name when a mirror with capitalised
          # owner/repo runs this workflow); a lowercase owner/repo is unchanged.
          echo "image=${GHCR_HOST}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Read app version from config.py
        id: appver
        # Single source of truth — GW_VERSION in config.py drives the image
        # tag AND (below) the git tag / GitHub Release. No git tag needed at
        # push time; the release job creates it if missing.
        run: |
          set -euo pipefail
          v=$(awk -F'"' '/^GW_VERSION *=/{print $2}' config.py | sed 's/AntiBotWaf_GW_//')
          if [[ -z "$v" ]]; then
            echo "::error::could not read GW_VERSION from config.py"
            exit 1
          fi
          # extract major.minor for the aliased tag
          mm=$(echo "$v" | awk -F. '{print $1"."$2}')
          echo "version=$v"  >> "$GITHUB_OUTPUT"
          echo "major_minor=$mm" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"     >> "$GITHUB_OUTPUT"

      - name: Compose image targets
        id: images
        # Build the metadata-action `images:` list in shell so the Harbor line
        # only appears when all three HARBOR_* vars are set. The previous
        # `name=…,enable=…` inline form relied on metadata-action short-
        # circuiting empty refs, which v6 no longer does — empty vars collapsed
        # to `//` and produced invalid `//:<tag>` refs that aborted buildx.
        run: |
          set -euo pipefail
          imgs="${{ steps.ghcr.outputs.image }}"
          if [[ -n "${HARBOR_HOST:-}" && -n "${HARBOR_PROJECT:-}" && -n "${HARBOR_IMAGE:-}" ]]; then
            imgs="${HARBOR_HOST}/${HARBOR_PROJECT}/${HARBOR_IMAGE}"$'\n'"$imgs"
          fi
          {
            echo "list<<EOF"
            echo "$imgs"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          # Publish under both registries with the same tag set. Harbor line is
          # inserted by the previous step only when HARBOR_HOST/PROJECT/IMAGE
          # are all populated (repo variables on the corporate mirror); on the
          # personal ghcr-only mirror the list is just the ghcr image.
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.appver.outputs.version }}
            type=raw,value=${{ steps.appver.outputs.major_minor }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Login to Harbor
        if: github.event_name != 'pull_request' && env.HAS_HARBOR == '1'
        env:
          HAS_HARBOR: ${{ secrets.HARBOR_USERNAME != '' && '1' || '0' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
        continue-on-error: true   # ghcr is the always-on target

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GHCR_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push when not a PR)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          # PRs build amd64-only and `load` into the runner's Docker daemon
          # so downstream steps (trivy image scan) can read the built image.
          # `docker load` does NOT support multi-arch manifest lists — attempting
          # `platforms: linux/amd64,linux/arm64` with `load: true` fails with
          # "docker exporter does not currently support exporting manifest lists".
          # On push (main / tag), we push both arches to ghcr — no `load` needed.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          pull: true
          provenance: true
          sbom: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 3. Trivy scan (filesystem + image) ──────────────────────────────────
  trivy-fs:
    name: trivy CVE scan
    needs: build-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload Trivy SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy vulnerability scan (filesystem)
        # Pinned to release tag (was @master — mutable branch, supply-chain risk).
        # Update deliberately per release; SHA-pin at next hardening pass.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: '1'
          format: sarif
          output: trivy-fs.sarif
          # .gitleaks.toml is the gitleaks allowlist — it necessarily contains
          # secret-SHAPED fixtures, so Trivy's secret scanner flags them (a fake
          # Slack token) as real. Skip that one file; it holds no credentials.
          # (Mirrors the --skip-files in security.yml's Trivy step.)
          skip-files: .gitleaks.toml
          trivyignores: .trivyignore

      - name: Upload SARIF (filesystem)
        # Skip when Trivy produced no file (e.g. it errored before writing
        # output). Uploading a missing SARIF hard-fails the job in the
        # codeql-action, masking the real Trivy failure upstream.
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy image scan (ghcr — always-available registry)
        # Pinned to release tag (was @master — mutable branch, supply-chain risk).
        # Scans the ghcr image because ghcr is unauthenticated for public
        # pulls; Harbor may not be reachable from public runners.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.build-scan.outputs.ghcr_image }}@${{ needs.build-scan.outputs.digest }}
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false
          exit-code: '1'
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF (image)
        # Same skip-if-missing guard — the image scan is likely to have no
        # output when the upstream build-scan failed and left the image ref /
        # digest empty (Trivy exits before writing SARIF).
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─── 4. Cosign image signing (keyless OIDC) — signs BOTH registries ─────
  sign:
    name: cosign keyless signing
    needs: [build-scan, trivy-fs]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Login to Harbor
        if: env.HAS_HARBOR == '1'
        env:
          HAS_HARBOR: ${{ secrets.HARBOR_USERNAME != '' && '1' || '0' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
        continue-on-error: true

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GHCR_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign ghcr image (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ${{ needs.build-scan.outputs.ghcr_image }}@${{ needs.build-scan.outputs.digest }}

      - name: Sign Harbor image (keyless, best-effort)
        if: env.HAS_HARBOR == '1'
        env:
          COSIGN_EXPERIMENTAL: '1'
          HAS_HARBOR: ${{ secrets.HARBOR_USERNAME != '' && '1' || '0' }}
        run: |
          cosign sign --yes \
            ${{ env.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${{ env.HARBOR_IMAGE }}@${{ needs.build-scan.outputs.digest }}
        continue-on-error: true

  # ─── 3b. Crowdsec-cached sidecar image ──────────────────────────────
  # Derivative of crowdsecurity/crowdsec:latest that adds a daily-cache
  # shim to `cscli hub update` — see crowdsec/README.md for context.
  # Published to `ghcr.io/<owner>/crowdsec-cached` so downstream users can
  # `docker pull` instead of doing the wrapper build locally.
  #
  # Runs in parallel with the main image build; multi-arch matches
  # upstream CrowdSec tags (amd64/arm64/armv7). Signed keyless with cosign
  # (same OIDC/Fulcio flow as the main image). No Harbor push — Harbor is
  # for the main appsec-antibot-gw image only.
  crowdsec-cached:
    name: crowdsec-cached (multi-arch build + sign)
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr
      id-token: write   # cosign keyless signing (Fulcio OIDC)
    outputs:
      image:  ${{ steps.ghcr.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Compute ghcr image path (lowercase owner + `crowdsec-cached`)
        id: ghcr
        run: |
          # Repo owner may be capitalised on mirrors; ghcr rejects uppercase.
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=${GHCR_HOST}/${owner}/crowdsec-cached" >> "$GITHUB_OUTPUT"

      - name: Read app version from config.py (for tag alignment)
        id: appver
        run: |
          set -euo pipefail
          v=$(awk -F'"' '/^GW_VERSION *=/{print $2}' config.py | sed 's/AntiBotWaf_GW_//')
          [[ -n "$v" ]] || { echo "::error::could not read GW_VERSION"; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.appver.outputs.version }}
            type=sha,format=short

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GHCR_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (skip push on PRs)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./crowdsec
          file: ./crowdsec/Dockerfile.crowdsec-cached
          # PR builds only amd64 (`load` needs single-arch, see main build
          # step for the full rationale). Push builds all three arches to
          # match the upstream CrowdSec tag set.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64,linux/arm/v7' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          pull: true
          provenance: true
          sbom: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=crowdsec-cached
          cache-to:   type=gha,mode=max,scope=crowdsec-cached

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request'

      - name: Sign ghcr crowdsec-cached image (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ${{ steps.ghcr.outputs.image }}@${{ steps.build.outputs.digest }}

  # ─── Secret + SAST/dep scans (folded in from the former secret-scan.yml
  # and security.yml so there is ONE pipeline; their badges are computed
  # by the `badges` job below from these jobs' results). ───────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload gitleaks SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Gitleaks
        run: |
          set +e
          # `dir` mode scans the WORKING TREE (what's shippable now), matching the
          # publish-time pre-push gate — an actionable check. Git-HISTORY secrets
          # in old commits can't be code-fixed (they need filter-repo + rotation),
          # so they don't gate CI here; trufflehog (--only-verified) still flags
          # any LIVE secret exposed in history.
          # Load .gitleaks.toml so the synthetic DLP fixtures in tests/ and the
          # dashboard localStorage keys don't false-positive (same file the
          # pre-push gate uses).
          cfg=""
          [ -f .gitleaks.toml ] && cfg="--config=/repo/.gitleaks.toml"
          docker run --rm -e NO_COLOR=1 -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir /repo $cfg --redact \
            --report-format=sarif --report-path=/repo/gitleaks.sarif \
            --exit-code=1
          # Also emit JSON for the human-readable step-summary table below.
          docker run --rm -e NO_COLOR=1 -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir /repo $cfg --redact \
            --report-format=json --report-path=/repo/gitleaks-report.json \
            --exit-code=0 >/dev/null 2>&1 || true
          code=$?
          set -e
          {
            echo "### Gitleaks"
            if [ "$code" -eq 0 ]; then
              echo "No secrets found."
            else
              echo "$(jq length gitleaks-report.json 2>/dev/null || echo '?') secret(s) found:"
              echo ""
              echo "| File | Line | Rule |"
              echo "|------|------|------|"
              jq -r '.[] | "| \(.File) | \(.StartLine) | \(.RuleID) |"' gitleaks-report.json 2>/dev/null || true
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          rm -f gitleaks-report.json
          # Keep gitleaks.sarif for the upload step below.
          exit $code

      # Feed gitleaks findings into GitHub's Code scanning alerts tab so a
      # regression is visible next to Trivy findings. Uploads even on the
      # zero-hit path so the tab's "no active alerts" state is authoritative.
      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        run: |
          set +e
          report=$(docker run --rm -v "${{ github.workspace }}:/repo" \
            trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --json --fail 2>/dev/null)
          code=$?
          set -e
          {
            echo "### TruffleHog"
            if [ "$code" -eq 0 ]; then
              echo "No verified secrets found."
            else
              findings=$(echo "$report" | grep '^{')
              echo "$(echo "$findings" | grep -c '^{') verified secret(s) found:"
              echo ""
              echo "| Detector | File | Line |"
              echo "|----------|------|------|"
              echo "$findings" | jq -r '"| \(.DetectorName) | \(.SourceMetadata.Data.Git.file // "-") | \(.SourceMetadata.Data.Git.line // "-") |"'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code

  lint:
    name: Lint & type (ruff / semgrep / mypy / vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
      - name: Install lint tools (hash-pinned)
        run: pip install --require-hashes -r requirements-tools.lock
      # ruff — HARD gate, but only the zero-tolerance codes. The full rules.md
      # §11 review deliberately accepts a large ruff baseline (E701, C901, S608,
      # F811, …) as non-blocking, so a plain `ruff check` would fail on code the
      # project treats as clean. Enforce just the must-be-0 set here; the broad
      # review stays a manual rules.md step.
      - name: ruff (zero-tolerance — F841 / S314 / B904)
        run: |
          ruff check proxy.py core/ db/ scoring.py identity.py helpers.py admin/ \
            --select F841,S314,B904
      # semgrep — HARD gate. OSS registry ruleset only; NEVER --config=auto and
      # NEVER set SEMGREP_APP_TOKEN (rules.md §9).
      - name: semgrep (OSS p/python — no token, no auto)
        run: semgrep scan --config p/python proxy.py core/ dashboards/*.py --error --quiet
      # mypy — INFORMATIONAL. The source carries an accepted no-redef baseline
      # (conditional re-defs behind import guards), so this surfaces regressions
      # without failing the build.
      - name: mypy (informational)
        continue-on-error: true
        run: mypy proxy.py core/ scoring.py identity.py helpers.py --ignore-missing-imports --no-error-summary
      # vulture — INFORMATIONAL dead-code sweep (≥90% confidence).
      - name: vulture (informational)
        continue-on-error: true
        run: vulture proxy.py core/ db/ scoring.py identity.py helpers.py admin/ --min-confidence 90

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
      - name: Install bandit (hash-pinned)
        run: pip install --require-hashes -r requirements-tools.lock
      - name: Run Bandit
        run: |
          set +e
          bandit -r . -x ./tests,./mutants \
            --severity-level high --confidence-level medium \
            -f json -o bandit-report.json
          code=$?
          set -e
          {
            echo "### Bandit"
            if [ "$code" -eq 0 ]; then
              echo "No HIGH severity findings."
            else
              echo "$(jq '[.results[] | select(.issue_severity=="HIGH")] | length' bandit-report.json) HIGH severity finding(s):"
              echo ""
              echo "| File | Line | Test | Confidence |"
              echo "|------|------|------|------------|"
              jq -r '.results[] | select(.issue_severity=="HIGH") | "| \(.filename) | \(.line_number) | \(.test_id) \(.test_name) | \(.issue_confidence) |"' bandit-report.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          rm -f bandit-report.json
          exit $code

  # ─── 1.9.12 additions — all `continue-on-error: true` so nothing turns
  # CI red on introduction. Each posts a step-summary; ratchet
  # continue-on-error to false once baseline is stable.

  # License compliance — flag any pulled-in dep whose license would prevent
  # closed-source distribution of the image or would force copyleft on
  # downstream users. GPL-3.0 is the canonical "no-go".
  license-scan:
    name: license compliance (pip-licenses)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: '3.13' }
      - name: Install deps + pip-licenses (hash-pinned)
        run: |
          pip install --require-hashes -r requirements.lock
          pip install --require-hashes -r requirements-tools.lock
      - name: Scan (fail on GPL family)
        run: |
          set +e
          pip-licenses --format=markdown \
            --fail-on='GPL-3.0;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later' \
            > licenses.md
          code=$?
          set -e
          echo "### pip-licenses" >> "$GITHUB_STEP_SUMMARY"
          head -60 licenses.md >> "$GITHUB_STEP_SUMMARY"
          exit $code

  # TLS posture — testssl.sh via the aquasec-maintained container image
  # against the freshly-built gateway. Documented gap in DYNAMIC_TESTS.md.
  testssl:
    name: TLS posture (testssl.sh)
    needs: build-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name != 'pull_request'
    steps:
      - name: Spin the freshly-built image
        env:
          IMAGE_REF: ${{ needs.build-scan.outputs.ghcr_image }}@${{ needs.build-scan.outputs.digest }}
        run: |
          set -euo pipefail
          docker run -d --name gw-testssl -p 18443:8443 \
            -e UPSTREAM=https://example.com \
            -e ADMIN_KEY=TEST-KEY-DO-NOT-USE \
            "$IMAGE_REF"
          # wait for healthcheck
          for i in $(seq 1 30); do
            docker inspect --format '{{.State.Health.Status}}' gw-testssl \
              | grep -q healthy && break
            sleep 2
          done
      - name: Run testssl.sh
        run: |
          # The gateway is HTTP on :8443 (TLS terminates at a reverse proxy
          # in production). If HTTPS is not enabled, testssl still surfaces
          # useful cert/cipher probes when pointed at the port — the goal is
          # baseline visibility, not a hard gate.
          docker run --rm --network host \
            drwetter/testssl.sh:3.2 --quiet --color 0 \
            127.0.0.1:18443 > testssl.log 2>&1 || true
          {
            echo "### testssl.sh (excerpt)"
            echo '```'
            tail -80 testssl.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Tear down
        if: always()
        run: docker rm -f gw-testssl || true

  # Cross-browser dashboard smoke — Playwright hits the login page on
  # Chromium + Firefox + WebKit (the trio production users see). Runs the
  # gateway locally, doesn't touch the mirror.
  playwright-crossbrowser:
    name: dashboards on chromium / firefox / webkit
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: '3.13' }
      - name: Install Playwright (hash-pinned)
        run: |
          pip install --require-hashes -r requirements.lock
          pip install --require-hashes -r requirements-tools.lock
          python -m playwright install --with-deps ${{ matrix.browser }}
      - name: Smoke test — login page renders
        env:
          UPSTREAM: https://example.com
          ADMIN_KEY: TEST-KEY-DO-NOT-USE
          BROWSER: ${{ matrix.browser }}
        run: |
          # If dedicated cross-browser smoke tests exist under tests/browser/,
          # run those; otherwise a single inline smoke keeps the job useful
          # while the suite is built out.
          if [ -d tests/browser ]; then
            pytest tests/browser -q --browser=${{ matrix.browser }}
          else
            python - <<'PY'
          import os, subprocess, sys, time, urllib.request
          # Spin the gateway on 127.0.0.1:18443 in the background.
          p = subprocess.Popen(
              [sys.executable, "proxy.py"],
              env={**os.environ, "LISTEN_HOST": "127.0.0.1", "LISTEN_PORT": "18443"},
          )
          try:
              # Wait up to 15s for /live
              for _ in range(30):
                  try:
                      urllib.request.urlopen(
                          "http://127.0.0.1:18443/antibot-appsec-gateway/live",
                          timeout=1).read()
                      break
                  except Exception:
                      time.sleep(0.5)
              from playwright.sync_api import sync_playwright
              browser_name = os.environ["BROWSER"]
              with sync_playwright() as pw:
                  br = getattr(pw, browser_name).launch()
                  page = br.new_page()
                  page.goto(
                      "http://127.0.0.1:18443/antibot-appsec-gateway/login",
                      wait_until="domcontentloaded", timeout=15000)
                  # This login page is a JS-driven, CSP-strict flow (no native
                  # <form> — it POSTs via fetch), so assert the real credential
                  # controls render instead of a <form> element.
                  assert page.locator("#username").count() >= 1, "no username field on login page"
                  assert page.locator("#password").count() >= 1, "no password field on login page"
                  assert page.locator("#submit").count() >= 1, "no submit button on login page"
                  assert page.title(), "no <title> on login page"
                  br.close()
              print(f"OK on {browser_name}")
          finally:
              p.terminate()
              p.wait(timeout=5)
          PY
          fi

  # Lighthouse CI — perf + a11y + best-practices score on 3 dashboards.
  # Non-blocking baseline; scores are recorded to the step summary so
  # drift is visible.
  lighthouse:
    name: lighthouse (perf / a11y / best-practices)
    needs: build-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name != 'pull_request'
    steps:
      - name: Spin the freshly-built image
        env:
          IMAGE_REF: ${{ needs.build-scan.outputs.ghcr_image }}@${{ needs.build-scan.outputs.digest }}
        run: |
          docker run -d --name gw-lh -p 18443:8443 \
            -e UPSTREAM=https://example.com \
            -e ADMIN_KEY=TEST-KEY-DO-NOT-USE \
            "$IMAGE_REF"
          for i in $(seq 1 30); do
            docker inspect --format '{{.State.Health.Status}}' gw-lh \
              | grep -q healthy && break
            sleep 2
          done
      - name: Run Lighthouse via Docker
        run: |
          # femtopixel/google-lighthouse is a maintained image; --chrome-flags
          # for headless-in-container; results appended to step summary.
          for url in \
            "http://172.17.0.1:18443/antibot-appsec-gateway/login"; do
            docker run --rm --network host \
              femtopixel/google-lighthouse \
              "$url" \
              --output=json --output-path=/tmp/lh.json \
              --quiet --chrome-flags="--headless --no-sandbox" \
              || true
          done
          {
            echo "### Lighthouse (login page)"
            echo '```'
            docker logs gw-lh 2>&1 | tail -20
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Tear down
        if: always()
        run: docker rm -f gw-lh || true

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
      - name: Install pip-audit (hash-pinned)
        run: pip install --require-hashes -r requirements-tools.lock
      - name: Audit requirements
        run: |
          set +e
          out=$(pip-audit -r requirements.txt 2>&1)
          code=$?
          set -e
          {
            echo "### pip-audit"
            if [ "$code" -eq 0 ]; then
              echo "No known vulnerabilities."
            else
              echo "Vulnerabilities found:"
              echo '```'
              echo "$out" | sed -r 's/\x1b\[[0-9;]*m//g'
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code

  # ─── CodeQL is deliberately NOT run here — the repo has Code scanning
  # "Default setup" enabled, which schedules CodeQL for you (own runner,
  # own SARIF upload). An advanced-configuration CodeQL job would collide
  # with this ("CodeQL analyses from advanced configurations cannot be
  # processed when the default setup is enabled").
  # To take control back, switch Code scanning to Advanced in
  # Settings → Code security → Code scanning → CodeQL analysis, then
  # re-add a job like:
  #   uses: github/codeql-action/init@<SHA>   (languages: python)
  #   uses: github/codeql-action/analyze@<SHA>
  # Trivy and gitleaks SARIF uploads below do NOT conflict — they're
  # different `category` tags in the same Code scanning alerts tab.

  # ─── Dependency review — blocks PRs that introduce a dep with a known
  # vulnerability OR an incompatible license. Runs only on PRs (the
  # dependency-graph diff is only meaningful there); on push-to-main
  # dependabot alerts pick up any drift instead.
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Review new dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail on any moderate+ severity introduced by this PR. Existing
          # deps aren't re-scored (dependabot alerts cover the baseline).
          fail-on-severity: moderate
          # Bad licenses — align with license-scan job above (GPL family).
          deny-licenses: GPL-3.0, GPL-3.0-only, GPL-3.0-or-later, AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later
          comment-summary-in-pr: on-failure

  # ─── SBOM upload to the Dependency graph — makes the exported SBOM
  # visible under Insights → Dependency graph → SBOM, so security tooling
  # and downstream consumers can query it via the GitHub API.
  sbom-upload:
    name: Upload SBOM to dependency graph
    needs: build-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # 1.9.13 — SHA-pinned syft via anchore/sbom-action (replaces the
      # `curl … | sh` install flagged by scorecard's Pinned-Dependencies check).
      - name: Generate SPDX SBOM from the image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.build-scan.outputs.ghcr_image }}@${{ needs.build-scan.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attach SBOM to the dependency graph
        uses: advanced-security/spdx-dependency-submission-action@169d22427d74f3faf93504e70b03eede8dab272a # v0.2.0
        with:
          filePath: sbom.spdx.json

  badges:
    name: publish status badges
    needs: [tests, build-scan, trivy-fs, gitleaks, trufflehog, lint, bandit, pip-audit]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Aggregate + write badge JSONs, force-push to `badges` branch
        env:
          R_TESTS:      ${{ needs.tests.result }}
          R_BUILD:      ${{ needs.build-scan.result }}
          R_TRIVY:      ${{ needs.trivy-fs.result }}
          R_GITLEAKS:   ${{ needs.gitleaks.result }}
          R_TRUFFLEHOG: ${{ needs.trufflehog.result }}
          R_LINT:       ${{ needs.lint.result }}
          R_BANDIT:     ${{ needs.bandit.result }}
          R_PIPAUDIT:   ${{ needs.pip-audit.result }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Worst-case aggregation across a control's jobs: failure > cancelled
          # > skipped > success.
          agg() {
            local worst=success r
            for r in "$@"; do
              case "$r" in
                failure)   echo failure; return;;
                cancelled) worst=cancelled;;
                skipped)   [ "$worst" = success ] && worst=skipped;;
              esac
            done
            echo "$worst"
          }
          # Badge filenames are UNCHANGED (README shields endpoints depend on them):
          #   secret-scan = gitleaks + trufflehog
          #   lint        = ruff/semgrep/mypy/vulture + bandit + pip-audit
          R_SECRET="$(agg "$R_GITLEAKS" "$R_TRUFFLEHOG")"
          R_LINTAGG="$(agg "$R_LINT" "$R_BANDIT" "$R_PIPAUDIT")"
          mkdir out && cd out
          mk() {   # <file> <label> <result>
            case "$3" in
              success)   msg=passing;   col=brightgreen;;
              failure)   msg=failing;   col=red;;
              cancelled) msg=cancelled; col=inactive;;
              skipped)   msg=skipped;   col=lightgrey;;
              *)         msg="$3";      col=yellow;;
            esac
            printf '{"schemaVersion":1,"label":"%s","message":"%s","color":"%s"}\n' \
              "$2" "$msg" "$col" > "$1.json"
          }
          mk secret-scan secret-scan "$R_SECRET"
          mk lint        lint        "$R_LINTAGG"
          mk tests       tests       "$R_TESTS"
          mk trivy-fs    trivy-fs    "$R_TRIVY"
          mk build-scan  build-scan  "$R_BUILD"
          git init -q
          git checkout -q -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "badges: ${GITHUB_SHA::7}"
          git push -q --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges

  # ─── 6. Summary comment on PRs ──────────────────────────────────────────
  pr-summary:
    name: PR summary
    needs: [build-scan, trivy-fs]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Print build outputs
        run: |
          echo "::notice title=Image digest::${{ needs.build-scan.outputs.digest }}"
          echo "::notice title=Tags::${{ needs.build-scan.outputs.tags }}"

  # ─── 7. Tag + GitHub Release (only when this main-branch commit bumps the ─
  # GW_VERSION and the derived tag doesn't already exist). This absorbs what
  # used to be a separate tag-triggered run — the workflow now emits one run
  # per push, and tags/releases itself when a bump is detected.
  release:
    name: tag + release (if version bumped)
    needs: [tests, build-scan, trivy-fs, sign, gitleaks, trufflehog, lint, bandit, pip-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the tag + release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need full history so `gh release create` can attach the tag

      - name: Read app version
        id: v
        run: |
          set -euo pipefail
          v=$(awk -F'"' '/^GW_VERSION *=/{print $2}' config.py | sed 's/AntiBotWaf_GW_//')
          [[ -n "$v" ]] || { echo "::error::no GW_VERSION"; exit 1; }
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.v.outputs.tag }}" \
               -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::release ${{ steps.v.outputs.tag }} already exists — skipping"
            echo "skip=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract CHANGELOG section
        if: steps.exists.outputs.skip != '1'
        run: |
          set -euo pipefail
          v="${{ steps.v.outputs.tag }}"; v="${v#v}"
          # Literal-string match — semver is safe today, but any non-semver tag
          # with a regex metachar would break a regex-based awk pattern.
          awk -v hdr="## [$v]" '
            $0 == hdr {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [[ ! -s RELEASE_NOTES.md ]]; then
            echo "Release ${{ steps.v.outputs.tag }}." > RELEASE_NOTES.md
          fi
          {
            echo ""
            echo "---"
            echo "**Container image:** \`docker pull ghcr.io/${GITHUB_REPOSITORY,,}:${{ steps.v.outputs.tag }}\`  (amd64 · arm64)"
          } >> RELEASE_NOTES.md

      - name: Create tag + GitHub Release
        if: steps.exists.outputs.skip != '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # --target pins the tag to THIS commit so a later merge to main
          # doesn't drift the tag from the SHA that CI actually validated.
          gh release create "${{ steps.v.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "AntiBotWaf_GW ${{ steps.v.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md
