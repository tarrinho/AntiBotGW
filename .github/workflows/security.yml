name: security

# Checks de segurança do código Python + dependências + container/IaC.
# Tudo mínimo, sem SARIF nem uploads — só pass/fail visível como check no PR.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install bandit
      - name: Run Bandit
        run: |
          bandit -r . \
            -x ./tests,./mutants \
            --severity-level medium \
            --confidence-level medium

  pip-audit:
    name: pip-audit (deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install pip-audit
      - name: Audit requirements
        run: pip-audit -r requirements.txt

  trivy:
    name: Trivy (deps/secret/misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            aquasec/trivy:latest fs /src \
            --scanners vuln,secret,misconfig \
            --ignorefile /src/.trivyignore \
            --severity HIGH,CRITICAL \
            --exit-code 1
